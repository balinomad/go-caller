name: Go

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Secure default permissions mapping: prevent privilege escalation
permissions:
  contents: read

jobs:
  build:
    name: test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    env:
      CGO_ENABLED: "0"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["go.mod", "stable"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go (from go.mod)
        if: matrix.go == 'go.mod'
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Set up Go (stable)
        if: matrix.go == 'stable'
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Verify go.mod is tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests with race detector (Linux)
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 -shuffle=on -covermode=atomic -coverprofile=coverage.out ./...

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: go test -count=1 -shuffle=on ./...

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go == 'go.mod'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
