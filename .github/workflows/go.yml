name: Go

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Secure default permissions mapping: prevent privilege escalation
permissions:
  contents: read

jobs:
  validate:
    name: Validate, Lint & Vulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run go mod tidy
        env:
          CGO_ENABLED: "0"
        shell: bash
        run: go mod tidy

      - name: Fail if go.mod or go.sum are dirty
        run: |
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "::error::go.mod or go.sum changed after 'go mod tidy' — commit the result"
            git diff go.mod go.sum
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=3m

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  build-and-test:
    needs: validate
    name: Test & Build (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    env:
      CGO_ENABLED: "0"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["go.mod", "stable"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go (from go.mod)
        if: matrix.go == 'go.mod'
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Run tests with race detector (Linux)
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 -shuffle=on -covermode=atomic -coverprofile=coverage.out ./...

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: go test -count=1 -shuffle=on ./...

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go == 'go.mod'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  ci-gate:
    name: CI Gate
    if: always()
    needs: [validate, build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate pipeline success
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
